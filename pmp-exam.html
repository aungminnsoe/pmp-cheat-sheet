<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PMP Practice Exam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;background:#e8e8e8;color:#333;min-height:100vh;display:flex;flex-direction:column}

/* Top toolbar - PMI teal gradient */
.tb{background:linear-gradient(180deg,#4db8c7 0%,#2e94a3 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.tb-top{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-size:14px}
.tb-top strong{font-size:15px}
.tb-sub{display:flex;justify-content:flex-end;align-items:center;gap:16px;padding:4px 16px 8px;font-size:12px}
.tb-timer{font-family:Consolas,"Courier New",monospace;font-size:13px;display:flex;align-items:center;gap:6px}
.tb-flag{cursor:pointer;display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:3px;border:1px solid rgba(255,255,255,0.3)}
.tb-flag:hover{background:rgba(255,255,255,0.1)}
.tb-flag.on{background:rgba(255,235,59,0.3);border-color:#ffeb3b;color:#ffeb3b}

/* Main content */
.main{flex:1;max-width:940px;width:100%;margin:0 auto;padding:24px 28px;background:#fff;min-height:calc(100vh - 110px);border-left:1px solid #ccc;border-right:1px solid #ccc}
.qtxt{font-size:15px;line-height:1.85;color:#222;margin-bottom:24px}
.qtxt .kw{background:linear-gradient(to bottom,transparent 55%,rgba(20,184,166,0.3) 55%);font-weight:600}
.qtxt .kw-action{background:rgba(239,68,68,0.15);border-radius:2px;font-weight:700;color:#b91c1c;padding:1px 4px}

/* Radio options */
.opts{margin-top:12px}
.opt{display:flex;align-items:flex-start;gap:14px;padding:11px 14px;margin-bottom:2px;cursor:pointer;border-radius:3px;transition:background .1s}
.opt:hover{background:#f0f4f8}
.opt.sel{background:#dbeafe}
.opt.ok{background:#d1fae5}
.opt.no{background:#fee2e2}
.opt.st .otxt{text-decoration:line-through;color:#aaa}
.rad{width:18px;height:18px;border:2px solid #94a3b8;border-radius:50%;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.rad.ck{border-color:#1d4ed8}
.rad.ck::after{content:"";width:10px;height:10px;background:#1d4ed8;border-radius:50%}
.olbl{font-weight:600;color:#475569;min-width:30px;font-size:15px}
.otxt{font-size:14.5px;line-height:1.7;color:#334155;flex:1}

/* Explanation */
.expl{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:16px;margin-top:20px;display:none}
.expl.show{display:block}
.expl-t{font-weight:700;font-size:14px;margin-bottom:8px}
.expl-t.ok{color:#166534}
.expl-t.no{color:#991b1b}
.expl-b{font-size:13px;line-height:1.75;color:#64748b}

/* Bottom nav - PMI dark teal */
.nav{background:linear-gradient(180deg,#2e94a3 0%,#1b6e7a 100%);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;box-shadow:0 -2px 6px rgba(0,0,0,0.15)}
.nbtn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.35);padding:7px 18px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;min-height:38px;display:flex;align-items:center;gap:6px;transition:background .15s}
.nbtn:hover{background:rgba(255,255,255,0.15)}
.nbtn:disabled{opacity:0.35;cursor:not-allowed}
.nbtn.sub{background:rgba(34,197,94,0.85);border-color:rgba(34,197,94,0.85)}
.nbtn.sub:hover{background:rgba(34,197,94,1)}
.nbtn.end{background:rgba(239,68,68,0.85);border-color:rgba(239,68,68,0.85)}
.nctr{display:flex;gap:8px;align-items:center}

/* Navigator */
.rv{max-width:940px;margin:0 auto;padding:24px;background:#fff;min-height:80vh}
.rvg{display:grid;grid-template-columns:repeat(auto-fill,40px);gap:5px;margin:14px 0}
.rvc{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:2px solid #cbd5e1;border-radius:4px;cursor:pointer;transition:all .15s}
.rvc:hover{transform:scale(1.1)}
.rvc.ans{background:#d1fae5;border-color:#22c55e}
.rvc.flg{background:#fef3c7;border-color:#f59e0b}
.rvc.una{background:#fee2e2;border-color:#ef4444}
.rvc.cur{outline:3px solid #1d4ed8;outline-offset:1px}

/* Results */
.res{max-width:720px;margin:40px auto;padding:32px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.drow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.dlbl{width:100px;font-size:13px;font-weight:600;color:#334155}
.dbar{flex:1;height:20px;display:flex;border-radius:4px;overflow:hidden}
.dz{height:100%}
.drt{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;min-width:85px;text-align:center}

/* Break */
.brk{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;background:#fff}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:18px;color:#64748b}

@media(max-width:768px){
  .main{padding:16px 14px}
  .qtxt{font-size:14px}
  .otxt{font-size:13px}
  .tb-top{font-size:12px;padding:6px 12px}
  .tb-sub{padding:3px 12px 6px;gap:10px}
}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading exam...</div></div>

<script>
// Load exam data from localStorage
var examData;
try {
  examData = JSON.parse(localStorage.getItem('pmp_exam_data'));
} catch(e) {}

if (!examData || !examData.questions || !examData.questions.length) {
  document.getElementById('app').innerHTML = '<div class="loading">No exam data found. Please start from the main app.</div>';
} else {
  initExam(examData);
}

function initExam(data) {
  var Q = data.questions;
  var N = data.count;
  var TT = data.totalTime;
  var HB = data.hasBreak;
  var BA = data.breakAt;

  var cur = 0;
  var ans = new Array(N).fill(-1);
  var fl = new Array(N).fill(false);
  var stk = {};
  var sub = new Array(N).fill(false);
  var wl = [];
  var sc = 0;
  var ts = TT;
  var ti = null;
  var done = false;
  var onBrk = false;
  var brkDn = false;
  var stM = false;

  var DM = {
    "People, Conflict & Leadership":"People","People":"People","Stakeholder & Communication":"People",
    "Agile":"Process","Process Groups":"Process","EVM":"Process","Knowledge Areas":"Process",
    "Risk Management":"Process","Risk":"Process","Quality & Compliance":"Process","Tools":"Process","Situational":"Process",
    "Ethics":"Business","Ethics & Professional Conduct":"Business"
  };

  var AK = ["first","next","best","most appropriate","most likely","most important","primary",
    "should the project manager do","what should","least likely","except","initially",
    "immediately","highest priority","before anything else"];
  var CK = ["servant leader","product owner","scrum master","sprint","iteration","backlog",
    "daily standup","retrospective","sprint review","sprint planning","velocity","kanban",
    "definition of done","agile","hybrid","change request","change control","CCB",
    "project charter","business case","WBS","critical path","earned value","CPI","SPI",
    "EAC","BAC","risk register","mitigate","transfer","avoid","accept","escalate",
    "contingency","conflict","collaborate","compromise","stakeholder","RACI","Tuckman",
    "emotional intelligence","quality","audit","contract","procurement","compliance","ethical"];

  function hl(t) {
    var h = esc(t);
    var all = AK.concat(CK);
    all.sort(function(a,b){ return b.length - a.length; });
    all.forEach(function(k) {
      try {
        var e = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var r = new RegExp('(?![^<]*>)\\b(' + e + ')\\b', 'gi');
        var isA = AK.indexOf(k) !== -1;
        h = h.replace(r, function(m,p){ return '<span class="' + (isA?'kw-action':'kw') + '">' + p + '</span>'; });
      } catch(ex){}
    });
    return h;
  }

  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function startT() {
    ti = setInterval(function() {
      if (onBrk) return;
      ts--;
      if (ts <= 0) { ts = 0; clearInterval(ti); endE(); }
      updT();
    }, 1000);
    updT();
  }

  function updT() {
    var h = Math.floor(ts/3600), m = Math.floor((ts%3600)/60), s = ts%60;
    var d = (h>0 ? h+':' : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    var el = document.getElementById('tmr');
    if (el) el.textContent = d;
  }

  function R() {
    if (done) { rRes(); return; }
    if (onBrk) { rBrk(); return; }

    var q = Q[cur], iS = sub[cur], sk = stk[cur] || [];
    var h = '';

    // Toolbar
    h += '<div class="tb"><div class="tb-top">';
    h += '<strong>PMI PMP Sample Test</strong>';
    h += '<span>' + (cur+1) + ' of ' + N + '</span>';
    h += '</div><div class="tb-sub">';
    h += '<span class="tb-timer">&#9201; <span id="tmr"></span> Time remaining</span>';
    h += '<span class="tb-flag' + (fl[cur]?' on':'') + '" onclick="F()">&#9873; Flag Items</span>';
    h += '</div></div>';

    // Main
    h += '<div class="main">';
    h += '<div class="qtxt">' + (iS ? hl(q.q) : esc(q.q)) + '</div>';
    h += '<div class="opts">';
    q.opts.forEach(function(o, i) {
      var c = 'opt';
      if (!iS && ans[cur] === i) c += ' sel';
      if (iS) {
        if (i === q.correct) c += ' ok';
        else if (ans[cur] === i) c += ' no';
      }
      if (sk.indexOf(i) !== -1) c += ' st';
      h += '<div class="' + c + '" onclick="S(' + i + ')">';
      h += '<div class="rad' + (ans[cur]===i?' ck':'') + '"></div>';
      h += '<span class="olbl">' + String.fromCharCode(65+i) + '.</span>';
      h += '<span class="otxt">' + esc(o) + '</span></div>';
    });
    h += '</div>';

    // Explanation
    if (iS) {
      var ok = ans[cur] === q.correct;
      h += '<div class="expl show"><div class="expl-t ' + (ok?'ok':'no') + '">';
      h += ok ? '&#10003; Correct' : '&#10007; Incorrect &mdash; Correct Answer: ' + String.fromCharCode(65+q.correct);
      h += '</div><div class="expl-b">' + esc(q.explain || 'Refer to study materials.') + '</div></div>';
    }
    h += '</div>';

    // Nav
    h += '<div class="nav">';
    h += '<button class="nbtn" onclick="P()"' + (cur===0?' disabled':'') + '>&#9664; Previous</button>';
    h += '<div class="nctr">';
    h += '<button class="nbtn" onclick="NV()">&#8853; Navigator</button>';
    if (!iS) h += '<button class="nbtn sub" onclick="SB()">Submit</button>';
    h += '</div>';
    if (cur < N-1) h += '<button class="nbtn" onclick="NX()">Next &#9654;</button>';
    else h += '<button class="nbtn end" onclick="endE()">End Exam</button>';
    h += '</div>';

    document.getElementById('app').innerHTML = h;
    updT();
  }

  // Expose functions globally
  window.S = function(i) {
    if (sub[cur]) return;
    if (stM) {
      var s = stk[cur] || [];
      var x = s.indexOf(i);
      if (x === -1) s.push(i); else s.splice(x, 1);
      stk[cur] = s;
      R(); return;
    }
    ans[cur] = i;
    R();
  };

  window.SB = function() {
    if (sub[cur] || ans[cur] === -1) return;
    sub[cur] = true;
    if (ans[cur] === Q[cur].correct) sc++;
    else wl.push({q: Q[cur], y: ans[cur]});
    R();
  };

  window.NX = function() {
    if (cur < N-1) {
      cur++;
      if (HB && !brkDn && cur === BA) { onBrk = true; brkDn = true; }
      R(); window.scrollTo(0,0);
    }
  };

  window.P = function() { if (cur > 0) { cur--; R(); window.scrollTo(0,0); } };
  window.F = function() { fl[cur] = !fl[cur]; R(); };
  window.G = function(i) { cur = i; onBrk = false; R(); window.scrollTo(0,0); };

  function rBrk() {
    var h = '<div class="tb"><div class="tb-top"><strong>Scheduled Break</strong><span id="tmr"></span></div></div>';
    h += '<div class="brk"><h2 style="font-size:28px;color:#1b6e7a;margin-bottom:16px">&#9749; 10-Minute Break</h2>';
    h += '<p style="font-size:16px;color:#64748b;margin-bottom:24px">Completed ' + BA + ' of ' + N + ' questions.<br>Stretch, hydrate, breathe.</p>';
    h += '<button class="nbtn" style="background:#2e94a3;padding:12px 28px;font-size:15px" onclick="onBrk=false;R()">Resume Exam &rarr;</button></div>';
    document.getElementById('app').innerHTML = h;
    updT();
  }

  window.NV = function() {
    var h = '<div class="tb"><div class="tb-top"><strong>Question Navigator</strong><span id="tmr"></span></div></div>';
    h += '<div class="rv"><h3 style="margin-bottom:8px">Question Navigator</h3>';
    var ac=0, uc=0, fc=0;
    ans.forEach(function(a,i){ if(a!==-1) ac++; else uc++; if(fl[i]) fc++; });
    h += '<p style="font-size:13px;color:#64748b;margin:8px 0 14px">Answered: <b>' + ac + '</b> &nbsp;|&nbsp; Unanswered: <b>' + uc + '</b> &nbsp;|&nbsp; Flagged: <b>' + fc + '</b></p>';
    h += '<div class="rvg">';
    for (var i = 0; i < N; i++) {
      var c = 'rvc';
      if (i === cur) c += ' cur';
      if (fl[i]) c += ' flg';
      else if (ans[i] !== -1) c += ' ans';
      else c += ' una';
      h += '<div class="' + c + '" onclick="G(' + i + ')">' + (i+1) + '</div>';
    }
    h += '</div>';
    h += '<div style="display:flex;gap:10px;margin-top:20px">';
    h += '<button class="nbtn" style="background:#2e94a3;padding:8px 20px" onclick="R()">Return to Exam</button>';
    h += '<button class="nbtn end" style="padding:8px 20px" onclick="endE()">End Exam</button>';
    h += '</div></div>';
    document.getElementById('app').innerHTML = h;
    updT();
  };

  window.endE = function() {
    if (!done) {
      var u = ans.filter(function(a){ return a === -1; }).length;
      if (u > 0 && !confirm('You have ' + u + ' unanswered questions. End exam?')) return;
      for (var i = 0; i < N; i++) {
        if (!sub[i]) {
          sub[i] = true;
          if (ans[i] === Q[i].correct) sc++;
          else wl.push({q: Q[i], y: ans[i]});
        }
      }
    }
    done = true;
    clearInterval(ti);
    rRes();
  };

  function rRes() {
    var p = Math.round((sc/N)*100);
    var el = TT - ts;
    var eM = Math.floor(el/60), eS = el%60;

    var dm = {People:{t:0,c:0}, Process:{t:0,c:0}, Business:{t:0,c:0}};
    Q.forEach(function(q,i) {
      var d = DM[q.cat] || 'Process';
      dm[d].t++;
      if (ans[i] === q.correct) dm[d].c++;
    });

    var h = '<div class="tb"><div class="tb-top"><strong>Examination Score Report</strong></div></div>';
    h += '<div class="res">';
    h += '<h2 style="text-align:center;color:#1e293b;margin-bottom:6px">Examination Score Report</h2>';
    h += '<div style="text-align:center;margin:20px 0">';
    h += '<div style="font-size:52px;font-weight:800;color:#1e293b">' + sc + '/' + N + '</div>';
    h += '<div style="font-size:22px;color:#64748b">' + p + '%</div>';
    h += '<div style="font-size:13px;color:#94a3b8;margin-top:4px">Time: ' + eM + 'm ' + eS + 's</div></div>';

    ['People','Process','Business'].forEach(function(k) {
      var d = dm[k]; if (!d.t) return;
      var pc = Math.round((d.c/d.t)*100);
      var rt, rc, mp;
      if (pc >= 80) { rt='Above Target'; rc='color:#166534;background:#dcfce7'; mp=82+Math.min((pc-80)*0.9,17); }
      else if (pc >= 70) { rt='Target'; rc='color:#166534;background:#dcfce7'; mp=55+(pc-70)*2.7; }
      else if (pc >= 55) { rt='Below Target'; rc='color:#92400e;background:#fef3c7'; mp=27+(pc-55)*1.8; }
      else { rt='Needs Improvement'; rc='color:#991b1b;background:#fee2e2'; mp=Math.max(2,pc*0.5); }

      h += '<div class="drow"><div class="dlbl">' + k + '</div>';
      h += '<div style="flex:1"><div class="dbar">';
      h += '<div class="dz" style="flex:27;background:#fee2e2;border-right:1px solid #e5e7eb"></div>';
      h += '<div class="dz" style="flex:28;background:#fef3c7;border-right:1px solid #e5e7eb"></div>';
      h += '<div class="dz" style="flex:27;background:#dcfce7;border-right:1px solid #e5e7eb"></div>';
      h += '<div class="dz" style="flex:18;background:#bbf7d0"></div></div>';
      h += '<div style="position:relative;height:14px"><div style="position:absolute;left:' + mp + '%;transform:translateX(-50%);font-size:14px;color:#334155">&#9650;</div></div></div>';
      h += '<div class="drt" style="' + rc + '">' + rt + '</div></div>';
    });

    // Wrong answers
    if (wl.length > 0) {
      h += '<details style="margin-top:24px"><summary style="cursor:pointer;font-weight:700;font-size:14px;color:#991b1b;padding:8px 0">&#128269; Review Wrong Answers (' + wl.length + ')</summary>';
      wl.forEach(function(it, idx) {
        var q = it.q;
        h += '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-top:10px">';
        h += '<div style="font-size:13px;font-weight:600;color:#1e293b;margin-bottom:8px;line-height:1.6">' + (idx+1) + '. ' + esc(q.q) + '</div>';
        if (it.y >= 0) h += '<div style="font-size:12px;color:#991b1b">&#10007; Your answer: ' + String.fromCharCode(65+it.y) + '. ' + esc(q.opts[it.y]||'') + '</div>';
        else h += '<div style="font-size:12px;color:#991b1b">&#10007; No answer selected</div>';
        h += '<div style="font-size:12px;color:#166534">&#10003; Correct: ' + String.fromCharCode(65+q.correct) + '. ' + esc(q.opts[q.correct]||'') + '</div>';
        h += '<div style="font-size:12px;color:#64748b;margin-top:8px;line-height:1.7">' + esc(q.explain||'') + '</div>';
        h += '</div>';
      });
      h += '</details>';
    }

    h += '<div style="text-align:center;margin-top:28px">';
    h += '<button class="nbtn" style="background:#2e94a3;padding:10px 24px;font-size:14px" onclick="window.close()">Close Window</button>';
    h += '</div></div>';

    document.getElementById('app').innerHTML = h;
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (done) return;
    if (e.key === 'ArrowRight') window.NX();
    if (e.key === 'ArrowLeft') window.P();
  });

  // Start
  R();
  startT();
}
</script>
</body>
</html>
